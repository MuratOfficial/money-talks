<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
    color: #333;
  }
  
  .container {
    max-width: 800px;
    margin: 0 auto;
    background: white;
    border-radius: 15px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    overflow: hidden;
  }
  
  .header {
    background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
    color: white;
    padding: 30px;
    text-align: center;
  }
  
  .title {
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 2px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  }
  
  .content {
    padding: 40px;
  }
  
  .section-title {
    font-size: 20px;
    color: #4CAF50;
    margin: 30px 0 15px 0;
    padding-bottom: 10px;
    border-bottom: 2px solid #4CAF50;
    font-weight: 600;
  }
  
  .info-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 30px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  }
  
  .info-table th,
  .info-table td {
    padding: 15px 20px;
    text-align: left;
    border-bottom: 1px solid #e0e0e0;
  }
  
  .info-table th {
    background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
    font-weight: 600;
    color: #495057;
    width: 40%;
  }
  
  .info-table td {
    background: white;
    color: #333;
  }
  
  .info-table tr:last-child th,
  .info-table tr:last-child td {
    border-bottom: none;
  }
  
  .highlight {
    background: linear-gradient(135deg, #fff3cd 0%, #ffeaa7 100%);
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 600;
  }
  
  .footer {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 2px solid #e0e0e0;
    text-align: center;
    color: #666;
    font-size: 12px;
  }
</style></head><body><div class="container"><div class="content">
  <div style="margin-top: 30px; background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%); color: white; padding: 20px; border-radius: 12px;">
    <h3 style="margin: 0 0 15px 0; font-size: 18px; text-align: center;">ФИНАНСОВАЯ СВОДКА</h3>
    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; font-size: 14px;">
      <div>
        <div style="opacity: 0.9;">Общий доход:</div>
        <div style="font-size: 18px; font-weight: bold; margin-top: 5px;">750 000 ₸</div>
      </div>
      <div>
        <div style="opacity: 0.9;">Общие расходы:</div>
        <div style="font-size: 18px; font-weight: bold; margin-top: 5px;">370 000 ₸</div>
      </div>
      <div>
        <div style="opacity: 0.9;">Активы:</div>
        <div style="font-size: 18px; font-weight: bold; margin-top: 5px;">28 000 000 ₸</div>
      </div>
      <div>
        <div style="opacity: 0.9;">Пассивы:</div>
        <div style="font-size: 18px; font-weight: bold; margin-top: 5px;">19 000 000 ₸</div>
      </div>
      <div style="grid-column: span 2; border-top: 2px solid rgba(255,255,255,0.3); padding-top: 15px; margin-top: 10px;">
        <div style="opacity: 0.9;">Чистый капитал:</div>
        <div style="font-size: 22px; font-weight: bold; margin-top: 5px;">9 000 000 ₸</div>
      </div>
      <div style="grid-column: span 2;">
        <div style="opacity: 0.9;">Дельта:</div>
        <div style="font-size: 22px; font-weight: bold; margin-top: 5px; color: #86efac;">380 000 ₸</div>
      </div>
    </div>
  </div>
</div></div></body></html>
