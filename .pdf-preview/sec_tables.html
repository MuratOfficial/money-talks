<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
    color: #333;
  }
  
  .container {
    max-width: 800px;
    margin: 0 auto;
    background: white;
    border-radius: 15px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    overflow: hidden;
  }
  
  .header {
    background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
    color: white;
    padding: 30px;
    text-align: center;
  }
  
  .title {
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 2px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  }
  
  .content {
    padding: 40px;
  }
  
  .section-title {
    font-size: 20px;
    color: #4CAF50;
    margin: 30px 0 15px 0;
    padding-bottom: 10px;
    border-bottom: 2px solid #4CAF50;
    font-weight: 600;
  }
  
  .info-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 30px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  }
  
  .info-table th,
  .info-table td {
    padding: 15px 20px;
    text-align: left;
    border-bottom: 1px solid #e0e0e0;
  }
  
  .info-table th {
    background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
    font-weight: 600;
    color: #495057;
    width: 40%;
  }
  
  .info-table td {
    background: white;
    color: #333;
  }
  
  .info-table tr:last-child th,
  .info-table tr:last-child td {
    border-bottom: none;
  }
  
  .highlight {
    background: linear-gradient(135deg, #fff3cd 0%, #ffeaa7 100%);
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 600;
  }
  
  .footer {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 2px solid #e0e0e0;
    text-align: center;
    color: #666;
    font-size: 12px;
  }
</style></head><body><div class="container"><div class="content">
    <div style="margin-bottom: 30px;">
      <div style="background: linear-gradient(135deg, #1e40af 0%, #1e40afdd 100%); color: white; padding: 12px 20px; margin-bottom: 15px; border-radius: 8px; font-weight: bold;">
        Доходы
      </div>
      
      <div style="background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 10px; overflow: hidden;">
        <table style="width: 100%; border-collapse: collapse;">
          <thead>
            <tr style="background: linear-gradient(135deg, #475569 0%, #64748b 100%); color: white;">
              <th style="padding: 12px; text-align: left; border-right: 1px solid rgba(255,255,255,0.2);">Название</th>
              <th style="padding: 12px; text-align: center; border-right: 1px solid rgba(255,255,255,0.2);">Сумма</th>
              
              <th style="padding: 12px; text-align: center;">Регулярность</th>
            </tr>
          </thead>
          <tbody>
            
              <tr style="background: #ffffff;">
                <td style="padding: 15px; font-weight: 600; border-right: 1px solid #e5e7eb;">Зарплата</td>
                <td style="padding: 15px; text-align: center; border-right: 1px solid #e5e7eb;">
                  600 000 ₸
                </td>
                
                <td style="padding: 15px; text-align: center;">regular</td>
              </tr>
            
              <tr style="background: #f8fafc;">
                <td style="padding: 15px; font-weight: 600; border-right: 1px solid #e5e7eb;">Фриланс</td>
                <td style="padding: 15px; text-align: center; border-right: 1px solid #e5e7eb;">
                  150 000 ₸
                </td>
                
                <td style="padding: 15px; text-align: center;">irregular</td>
              </tr>
            
          </tbody>
        </table>
        
        <div style="background: #fbbf24; padding: 12px; text-align: center; font-weight: bold; color: #92400e;">
          ИТОГО: 750 000 ₸
        </div>
      </div>
    </div>
  
    <div style="margin-bottom: 30px;">
      <div style="background: linear-gradient(135deg, #ea580c 0%, #ea580cdd 100%); color: white; padding: 12px 20px; margin-bottom: 15px; border-radius: 8px; font-weight: bold;">
        Пассивы
      </div>
      
      <div style="background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 10px; overflow: hidden;">
        <table style="width: 100%; border-collapse: collapse;">
          <thead>
            <tr style="background: linear-gradient(135deg, #475569 0%, #64748b 100%); color: white;">
              <th style="padding: 12px; text-align: left; border-right: 1px solid rgba(255,255,255,0.2);">Название</th>
              <th style="padding: 12px; text-align: center; border-right: 1px solid rgba(255,255,255,0.2);">Сумма</th>
              
              
            </tr>
          </thead>
          <tbody>
            
              <tr style="background: #ffffff;">
                <td style="padding: 15px; font-weight: 600; border-right: 1px solid #e5e7eb;">Ипотека</td>
                <td style="padding: 15px; text-align: center; border-right: 1px solid #e5e7eb;">
                  15 000 000 ₸
                </td>
                
                
              </tr>
            
              <tr style="background: #f8fafc;">
                <td style="padding: 15px; font-weight: 600; border-right: 1px solid #e5e7eb;">Автокредит</td>
                <td style="padding: 15px; text-align: center; border-right: 1px solid #e5e7eb;">
                  4 000 000 ₸
                </td>
                
                
              </tr>
            
          </tbody>
        </table>
        
        <div style="background: #fbbf24; padding: 12px; text-align: center; font-weight: bold; color: #92400e;">
          ИТОГО: 19 000 000 ₸
        </div>
      </div>
    </div>
  </div></div></body></html>
